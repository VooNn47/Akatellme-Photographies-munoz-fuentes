server:
  port: 8080


jwt:
  secret: "493358340235739058340598340598340598340598340598"

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*" 
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:
        # ==========================================
        # 10. SERVICIO AUTENTICACIÓN (Puerto 8093) 
        # ==========================================
        - id: auth-service
          uri: http://localhost:8093
          predicates:
            - Path=/auth/**
        - id: auth-service-docs
          uri: http://localhost:8093
          predicates:
            - Path=/auth/v3/api-docs

        # ==========================================
        # RUTAS DE MICROSERVICIOS DE NEGOCIO
        # ==========================================
        
        # 1. SERVICIO USUARIOS / AKATELLME (Puerto 8082)
        - id: usuarios-service
          uri: http://localhost:8082
          predicates:
            - Path=/usuario/**,/usuario/tipo/**,/sesion/**
          filters:
            - AuthenticationFilter

        - id: usuarios-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/service/v3/api-docs

        # 2. SERVICIO RESERVAS (Puerto 8083) 
        - id: reservas-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/reservas,/api/v1/reservas/**,/fotografos,/fotografos/**,/tipos-sesion,/tipos-sesion/**
          filters:
            - AuthenticationFilter

        - id: reservas-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/reservas/v3/api-docs

        # 3. SERVICIO PAGOS (Puerto 8084)
        - id: pagos-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/pagos,/api/v1/pagos/**
          filters:
            - AuthenticationFilter

        - id: pagos-service-docs
          uri: http://localhost:8084
          predicates:
            - Path=/pagos/v3/api-docs

        # 4. SERVICIO EVENTO (Puerto 8085)
        - id: evento-service
          uri: http://localhost:8085
          predicates:
            - Path=/eventos,/eventos/**
          filters:
            - AuthenticationFilter

        - id: evento-service-docs
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/evento/v3/api-docs

        # 5. SERVICIO NOTIFICACIONES (Puerto 8086)
        - id: notificaciones-service
          uri: http://localhost:8086
          predicates:
            - Path=/notificaciones,/notificaciones/**
          filters:
            - AuthenticationFilter

        - id: service-notificaciones-docs
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/notificaciones/v3/api-docs

        # 6. SERVICIO RESEÑAS (Puerto 8088)
        - id: serice-resenas
          uri: http://localhost:8088
          predicates:
            - Path=/resenas,/resenas/**
          filters:
            - AuthenticationFilter

        - id: serice-resenas-docs
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/resenas/v3/api-docs

        # 7. SERVICIO CONTACTO (Puerto 8089)
        - id: contacto-service
          uri: http://localhost:8089
          predicates:
            - Path=/contacto,/contacto/**
          filters:
            - AuthenticationFilter

        - id: contacto-docs
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/contacto/v3/api-docs

        # 8. SERVICIO DISPONIBILIDAD (Puerto 8090)
        - id: disponibilidad-service
          uri: http://localhost:8090  
          predicates:
            - Path=/disponibilidades,/disponibilidades/**
          filters:
            - AuthenticationFilter

        - id: disponibilidad-docs
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/disponibilidad/v3/api-docs

        # 9. SERVICIO GALERÍA (Puerto 8091)
        - id: galeria-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/galerias,/api/v1/galerias/**
          filters:
            - AuthenticationFilter

        - id: galeria-docs
          uri: http://localhost:8091
          predicates:
            - Path=/galerias/v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 01. Servicio Usuarios
        url: /api/v1/service/v3/api-docs
      - name: 02. Servicio Reservas
        url: /reservas/v3/api-docs
      - name: 03. Servicio Pagos
        url: /pagos/v3/api-docs
      - name: 04. Servicio Events
        url: /api/v1/evento/v3/api-docs
      - name: 05. Servicio Notificaciones
        url: /api/v1/notificaciones/v3/api-docs
      - name: 06. Servicio Reseñas
        url: /api/v1/resenas/v3/api-docs
      - name: 07. Servicio Contacto
        url: /api/v1/contacto/v3/api-docs
      - name: 08. Servicio Disponibilidad
        url: /api/v1/disponibilidad/v3/api-docs
      - name: 09. Servicio Galería
        url: /galerias/v3/api-docs
      - name: 10. Servicio Autenticación
        url: /auth/v3/api-docs